<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="HARDWARE HD Skull Icon">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070a0f"/>
      <stop offset="62%" stop-color="#121d28"/>
      <stop offset="100%" stop-color="#180a13"/>
    </linearGradient>
    <linearGradient id="strokeGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f3ff"/>
      <stop offset="100%" stop-color="#ff003c"/>
    </linearGradient>
    <radialGradient id="skullBase" cx="48%" cy="34%" r="64%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="54%" stop-color="#d9e2ea"/>
      <stop offset="100%" stop-color="#a9b3bc"/>
    </radialGradient>
    <radialGradient id="skullShade" cx="50%" cy="78%" r="62%">
      <stop offset="0%" stop-color="#7f8a95" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#2a3138" stop-opacity="0.78"/>
    </radialGradient>
    <linearGradient id="jawLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e9eef4"/>
      <stop offset="100%" stop-color="#9ca7b1"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <rect x="24" y="24" width="464" height="464" rx="90" fill="none" stroke="url(#strokeGlow)" stroke-width="10"/>

  <!-- skull head -->
  <path d="M256 90c-82 0-136 56-136 134 0 48 20 84 56 108v44c0 24 20 44 44 44h72c24 0 44-20 44-44v-44c36-24 56-60 56-108 0-78-54-134-136-134z" fill="url(#skullBase)"/>
  <path d="M256 94c-78 0-130 53-130 127 0 46 20 79 55 101v52c0 21 17 38 38 38h74c21 0 38-17 38-38v-52c35-22 55-55 55-101 0-74-52-127-130-127z" fill="none" stroke="#c6d0d9" stroke-width="2" opacity="0.42"/>

  <!-- eye sockets -->
  <ellipse cx="203" cy="227" rx="42" ry="36" fill="#11151c"/>
  <ellipse cx="309" cy="227" rx="42" ry="36" fill="#11151c"/>
  <ellipse cx="197" cy="220" rx="18" ry="12" fill="#07090d" opacity="0.55"/>
  <ellipse cx="303" cy="220" rx="18" ry="12" fill="#07090d" opacity="0.55"/>

  <!-- nose -->
  <path d="M256 248l-26 43c-3 6 1 13 8 13h36c7 0 11-7 8-13z" fill="#121820"/>

  <!-- cheek and cranial shading -->
  <path d="M146 268c12 30 37 52 72 64l-18 36c-34-12-61-36-76-72z" fill="#8f9aa4" opacity="0.35"/>
  <path d="M366 268c-12 30-37 52-72 64l18 36c34-12 61-36 76-72z" fill="#8f9aa4" opacity="0.35"/>
  <ellipse cx="256" cy="318" rx="104" ry="78" fill="url(#skullShade)" opacity="0.4"/>

  <!-- jaw and teeth -->
  <path d="M188 334h136v43c0 20-16 36-36 36h-64c-20 0-36-16-36-36z" fill="url(#jawLight)"/>
  <path d="M196 334h120" stroke="#7f8993" stroke-width="2" opacity="0.45"/>
  <path d="M220 343v55M238 343v58M256 343v59M274 343v58M292 343v55" stroke="#161c23" stroke-width="8" stroke-linecap="round"/>
  <path d="M213 390h86" stroke="#727d88" stroke-width="2" opacity="0.5"/>

  <!-- cracks -->
  <path d="M247 126l-12 20 10 16-10 15" stroke="#6e7782" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.8"/>
  <path d="M332 150l-12 14 9 13-10 12" stroke="#6e7782" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.72"/>

  <!-- HD mark -->
  <path d="M126 430v-64h20v24h20v-24h20v64h-20v-24h-20v24z" fill="#00f3ff"/>
  <path d="M306 430v-64h28c20 0 34 13 34 32s-14 32-34 32zm20-18h7c9 0 15-6 15-14s-6-14-15-14h-7z" fill="#ff003c"/>
