<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">HARDWARE Pocket Edition</title>
  <desc id="desc">Arte de compartilhamento da HARDWARE Pocket Edition em Sao Paulo.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050505" />
      <stop offset="58%" stop-color="#121212" />
      <stop offset="100%" stop-color="#240013" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff003c" />
      <stop offset="100%" stop-color="#00f3ff" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <circle cx="1010" cy="120" r="190" fill="#ff003c" opacity="0.12" />
  <circle cx="160" cy="580" r="210" fill="#00f3ff" opacity="0.09" />
  <rect x="72" y="72" width="1056" height="486" rx="28" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.48" />
  <rect x="96" y="96" width="1008" height="438" rx="22" fill="#090909" opacity="0.56" />

  <text x="110" y="182" fill="#ffffff" font-family="Rajdhani, Arial, sans-serif" font-size="124" font-weight="800" letter-spacing="10" filter="url(#glow)">HARD</text>
  <text x="455" y="182" fill="#ffffff" font-family="Rajdhani, Arial, sans-serif" font-size="124" font-weight="800" letter-spacing="10">WARE</text>

  <rect x="112" y="230" width="224" height="10" rx="5" fill="#ff003c" />
  <rect x="348" y="230" width="178" height="10" rx="5" fill="#00f3ff" />

  <text x="112" y="310" fill="#f5f7fb" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="600" letter-spacing="1">POCKET EDITION</text>
  <text x="112" y="372" fill="#c8d4dd" font-family="Share Tech Mono, Consolas, monospace" font-size="28" letter-spacing="3">10 APR 2026 / SAO PAULO / 20H - 05H</text>

  <text x="112" y="460" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="500">Hardtechno, neo rave e pista industrial.</text>
  <text x="112" y="506" fill="#9cb7c4" font-family="Inter, Arial, sans-serif" font-size="26">hardwareparty.com.br</text>
</svg>
