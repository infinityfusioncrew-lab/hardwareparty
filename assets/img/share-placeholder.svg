<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Hardware Placeholder</title>
  <desc id="desc">Imagem de placeholder para card e compartilhamento.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1118"/>
      <stop offset="1" stop-color="#1a050f"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00f3ff"/>
      <stop offset="1" stop-color="#ff003c"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <g opacity="0.35">
    <circle cx="300" cy="260" r="180" fill="none" stroke="url(#line)" stroke-width="2"/>
    <circle cx="1260" cy="620" r="220" fill="none" stroke="url(#line)" stroke-width="2"/>
    <path d="M120 780h1360" stroke="url(#line)" stroke-width="3"/>
  </g>
  <g fill="none" stroke="#00f3ff" stroke-width="2" opacity="0.5">
    <path d="M120 140h260l70 90h280"/>
    <path d="M1520 180h-260l-70 90h-300"/>
  </g>
  <text x="800" y="430" text-anchor="middle" fill="#ffffff" font-size="140" font-family="Rajdhani, Arial, sans-serif" font-weight="800" letter-spacing="8">HARDWARE</text>
  <text x="800" y="510" text-anchor="middle" fill="#ff003c" font-size="42" font-family="Share Tech Mono, monospace" letter-spacing="10">POCKET EDITION</text>
</svg>
